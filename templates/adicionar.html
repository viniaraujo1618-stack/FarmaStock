<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Produto</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            height: 100vh;
            margin: 0;

            /* centralização total */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #218838;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            color: #555;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>➕ Adicionar Produto</h1>

    <form method="POST">

        <input type="text" name="nome" placeholder="Nome do produto" required>

        <input type="number" step="0.01" name="preco" placeholder="Preço" required>

        <textarea name="descricao" placeholder="Descrição"></textarea>

        <button type="submit">Salvar Produto</button>

    </form>

    <a class="voltar" href="/produtos">← Voltar para produtos</a>

</div>

</body>
</html>
